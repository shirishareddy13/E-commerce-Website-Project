<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Online Store</h1>
</header>

<section class="products">

    <div class="product">
        <h2>Smart Watch</h2>
        <p>Price: ₹2000</p>
        <button onclick="addToCart('Smart Watch', 2000)">
            Add to Cart
        </button>
    </div>

    <div class="product">
        <h2>Headphones</h2>
        <p>Price: ₹1500</p>
        <button onclick="addToCart('Headphones', 1500)">
            Add to Cart
        </button>
    </div>

</section>

<section class="cart">
    <h2>Shopping Cart</h2>
    <ul id="cart-items"></ul>

    <h3>Total: ₹<span id="total">0</span></h3>
</section>

<script src="script.js"></script>

</body>
</html>
